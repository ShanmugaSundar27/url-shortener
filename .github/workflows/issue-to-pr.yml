name: Issue to PR

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  implement:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'ai-implement') ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude') &&
       github.event.comment.user.type != 'Bot')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-haiku-4-5
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(gh:*),Bash(npm:*)"
            --max-turns 20
          show_full_output: true
          prompt: |
            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            ${{ github.event_name == 'issue_comment' && format('---{0}{0}Latest comment from @{1}:{0}{0}{2}{0}{0}Act on this comment specifically.

            You MUST complete ALL of these steps in order. Do not stop early.

            1. Read CLAUDE.md and follow ALL conventions in it.
            2. Explore relevant existing files before writing any code.
            3. Create a branch: `git checkout -b feature/issue-${{ github.event.issue.number }}-<short-slug>`
            4. Implement the changes. Write each file ONLY ONCE.
            5. If the project has tests, run them and fix any failures.
            6. Stage and commit your changes:
                 `git add -A`
                 `git commit -m "<type>: <description> (#${{ github.event.issue.number }})"`
            7. Push the branch:
                 `git push -u origin feature/issue-${{ github.event.issue.number }}-<short-slug>`
            8. Open a DRAFT pull request using the gh CLI:
                 `gh pr create --draft --title "<type>: <description> (#${{ github.event.issue.number }})" --body "Closes #${{ github.event.issue.number }}\n\n## Summary\n<what changed>\n\n## Notes\n<any decisions>"`
            9. Confirm the PR URL was printed. Your task is NOT complete until step 8 succeeds.

            If the issue is ambiguous, comment on the issue and stop. Otherwise,
            you must reach step 8 — do not stop after writing files.

name: Issue to PR

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'ai-implement'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-opus-4-5"
          prompt: |
            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Implement this issue end-to-end:
            1. Read CLAUDE.md and follow ALL conventions in it
            2. Explore the relevant existing files before writing any code
            3. Create a branch named feature/issue-${{ github.event.issue.number }}-<short-slug>
            4. Implement the changes, mirroring existing patterns
            5. If the project has tests, run them and fix any failures
            6. Open a DRAFT pull request that closes issue #${{ github.event.issue.number }}
            7. In the PR description, describe what was changed and any decisions made

            If the issue is ambiguous or scope is too large, comment on the issue
            asking for clarification instead of guessing.
